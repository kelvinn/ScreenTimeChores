name: RewardShield
options:
  bundleIdPrefix: com.rewardsield
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "G69C367VGA"

schemes:
  RewardShield:
    build:
      targets:
        RewardShield: all
        ManagedSettingsStoreExtension: all
        DeviceActivityMonitorExtension: all
        ShieldUIExtension: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  RewardShield:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rewardsield.app
        CODE_SIGN_ENTITLEMENTS: Sources/App/RewardShield.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/App/RewardShield.entitlements
      properties:
        com.apple.developer.family-controls: ""
        com.apple.security.application-groups:
          - group.com.rewardsield.app
    dependencies:
      - target: ManagedSettingsStoreExtension
      - target: DeviceActivityMonitorExtension
      - target: ShieldUIExtension

  ManagedSettingsStoreExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ManagedSettingsStoreExtension
      - path: Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/ManagedSettingsStoreExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rewardsield.app.ManagedSettingsStore
        CODE_SIGN_ENTITLEMENTS: Sources/ManagedSettingsStoreExtension/ManagedSettingsStoreExtension.entitlements
        SKIP_INSTALL: YES
    entitlements:
      path: Sources/ManagedSettingsStoreExtension/ManagedSettingsStoreExtension.entitlements
      properties:
        com.apple.developer.family-controls: ""
        com.apple.security.application-groups:
          - group.com.rewardsield.app

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/DeviceActivityMonitorExtension
      - path: Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/DeviceActivityMonitorExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rewardsield.app.DeviceActivityMonitor
        CODE_SIGN_ENTITLEMENTS: Sources/DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
        SKIP_INSTALL: YES
    entitlements:
      path: Sources/DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
      properties:
        com.apple.developer.family-controls: ""
        com.apple.security.application-groups:
          - group.com.rewardsield.app

  ShieldUIExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ShieldUIExtension
      - path: Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/ShieldUIExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rewardsield.app.ShieldUI
        CODE_SIGN_ENTITLEMENTS: Sources/ShieldUIExtension/ShieldUIExtension.entitlements
        SKIP_INSTALL: YES
    entitlements:
      path: Sources/ShieldUIExtension/ShieldUIExtension.entitlements
      properties:
        com.apple.developer.family-controls: ""
        com.apple.security.application-groups:
          - group.com.rewardsield.app

  RewardShieldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Sources/AppTests
      - path: Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/AppTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rewardsield.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RewardShield.app/RewardShield"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: RewardShield
